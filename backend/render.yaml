services:
  - type: web
    name: discom-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # you set this manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # set this to your Supabase connection string in Render dashboard
